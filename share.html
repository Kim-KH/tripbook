<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>✈️ TripBook 여행 공유</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap');

  :root {
    --brand:   #FF6B35;
    --navy:    #1A2744;
    --green:   #10b981;
    --bg:      #F5F6FA;
    --card:    #ffffff;
    --border:  #E4E8F0;
    --sub:     #64748B;
    --muted:   #94A3B8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    background: var(--bg);
    color: var(--navy);
    min-height: 100vh;
  }

  /* ── 로딩 ── */
  #loadingScreen {
    position: fixed; inset: 0;
    background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    z-index: 9999;
  }
  #loadingScreen .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loadingScreen p { color: rgba(255,255,255,0.8); font-size: 0.95rem; font-weight: 600; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 선택 화면 ── */
  #choiceScreen {
    display: none;
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #1A2744 0%, #2C3F6E 100%);
    align-items: center; justify-content: center;
    padding: 24px;
    z-index: 9998;
  }
  #choiceScreen.show { display: flex; }

  .choice-card {
    background: white;
    border-radius: 28px;
    padding: 32px 24px;
    width: 100%; max-width: 380px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }
  .choice-card .plane { font-size: 48px; margin-bottom: 8px; }
  .choice-card .trip-name {
    font-size: 1.3rem; font-weight: 900; color: var(--navy);
    margin-bottom: 4px; line-height: 1.3;
  }
  .choice-card .trip-dates {
    font-size: 0.85rem; color: var(--sub); margin-bottom: 28px;
  }
  .choice-card .divider {
    height: 1px; background: var(--border); margin-bottom: 20px;
  }
  .choice-card .label {
    font-size: 0.8rem; font-weight: 700; color: var(--muted);
    margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px;
    border: none; border-radius: 16px;
    font-size: 1rem; font-weight: 800;
    cursor: pointer; transition: all 0.15s;
    margin-bottom: 12px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-view {
    background: var(--bg);
    color: var(--navy);
    border: 2px solid var(--border);
  }
  .btn-app {
    background: linear-gradient(135deg, var(--brand), #E55A24);
    color: white;
    box-shadow: 0 8px 20px rgba(255,107,53,0.35);
  }
  .btn .icon { font-size: 1.3rem; }
  .btn .text { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
  .btn .text-main { font-size: 0.95rem; font-weight: 800; }
  .btn .text-sub { font-size: 0.75rem; font-weight: 600; opacity: 0.7; }

  /* ── 오류 화면 ── */
  #errorScreen {
    display: none;
    position: fixed; inset: 0;
    background: var(--navy);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; padding: 32px;
    text-align: center;
  }
  #errorScreen.show { display: flex; }
  #errorScreen .emoji { font-size: 48px; }
  #errorScreen h2 { color: white; font-size: 1.2rem; }
  #errorScreen p { color: rgba(255,255,255,0.6); font-size: 0.9rem; line-height: 1.6; }

  /* ── 일정 뷰어 ── */
  #viewer { display: none; }
  #viewer.show { display: block; }

  .viewer-header {
    background: var(--navy);
    padding: 52px 20px 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .viewer-header .logo {
    font-size: 0.85rem; font-weight: 700;
    color: rgba(255,255,255,0.5); margin-bottom: 8px;
  }
  .viewer-header h1 {
    font-size: 1.3rem; font-weight: 900; color: white; margin-bottom: 4px;
  }
  .viewer-header .dates {
    font-size: 0.8rem; color: rgba(255,255,255,0.6);
  }
  .viewer-header .badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.15);
    padding: 4px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700; color: white;
    margin-top: 10px;
  }

  /* 앱 열기 플로팅 버튼 */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    background: linear-gradient(135deg, var(--brand), #E55A24);
    color: white; border: none; border-radius: 20px;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.9rem; font-weight: 800;
    box-shadow: 0 8px 24px rgba(255,107,53,0.4);
    cursor: pointer; z-index: 200;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 날짜 카드 */
  .day-section {
    margin: 16px 16px 0;
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(26,39,68,0.07);
  }
  .day-section:last-child { margin-bottom: 100px; }

  .day-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: #f8fafc;
  }
  .day-badge {
    background: var(--navy); color: white;
    font-size: 0.75rem; font-weight: 800;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .day-date {
    font-size: 0.9rem; font-weight: 700; color: var(--navy);
  }
  .day-city {
    font-size: 0.78rem; color: var(--sub);
    margin-left: auto;
  }

  .cell-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid #f1f5f9;
  }
  .cell-row:last-child { border-bottom: none; }

  .cell-cat {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    min-width: 40px;
  }
  .cell-cat .emoji { font-size: 1.1rem; }
  .cell-cat .cat-label {
    font-size: 0.62rem; color: var(--muted); font-weight: 600;
  }

  .cell-content { flex: 1; }
  .cell-title {
    font-size: 0.9rem; font-weight: 700; color: var(--navy);
    margin-bottom: 2px;
  }
  .cell-detail {
    font-size: 0.78rem; color: var(--sub); line-height: 1.5;
  }
  .cell-budget {
    font-size: 0.78rem; font-weight: 700; color: #b45309;
    background: #fffbeb; padding: 2px 8px; border-radius: 6px;
    display: inline-block; margin-top: 4px;
  }

  .empty-day {
    padding: 20px 16px;
    text-align: center;
    font-size: 0.85rem; color: var(--muted);
  }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>여행 일정을 불러오는 중...</p>
</div>

<!-- 오류 -->
<div id="errorScreen">
  <div class="emoji">😕</div>
  <h2>공유를 찾을 수 없습니다</h2>
  <p>링크가 만료되었거나<br>유효하지 않은 공유입니다.</p>
</div>

<!-- 선택 화면: 보기만 / 앱에서 열기 -->
<div id="choiceScreen">
  <div class="choice-card">
    <div class="plane">✈️</div>
    <div class="trip-name" id="choiceTripName">여행 일정</div>
    <div class="trip-dates" id="choiceTripDates"></div>
    <div class="divider"></div>
    <div class="label">어떻게 볼까요?</div>

    <button class="btn btn-view" onclick="handleViewOnly()">
      <span class="icon">👀</span>
      <span class="text">
        <span class="text-main">보기만</span>
        <span class="text-sub">브라우저에서 읽기 전용으로 보기</span>
      </span>
    </button>

    <button class="btn btn-app" onclick="handleOpenApp()">
      <span class="icon">📱</span>
      <span class="text">
        <span class="text-main">앱에서 열기</span>
        <span class="text-sub">TripBook 앱으로 일정 참여하기</span>
      </span>
    </button>
  </div>
</div>

<!-- 일정 뷰어 -->
<div id="viewer">
  <div class="viewer-header">
    <div class="logo">✈️ TripBook</div>
    <h1 id="viewerTitle"></h1>
    <div class="dates" id="viewerDates"></div>
    <div class="badge">👀 읽기 전용</div>
  </div>
  <div id="viewerContent"></div>
  <button class="fab" onclick="handleOpenApp()">
    📱 앱에서 열기
  </button>
</div>

<script>
const SUPABASE_URL  = 'https://ynygpludtqkrqgyjjasd.supabase.co';
const SUPABASE_ANON = 'sb_publishable_t463PBZvKrvLZ6hXr5aLfA_FJ_PTzbw';

const DAYS   = ['일','월','화','수','목','금','토'];
const CATS   = [
  { key: 'schedule',  emoji: '📅', label: '일정' },
  { key: 'place',     emoji: '📍', label: '장소' },
  { key: 'stay',      emoji: '🏨', label: '숙소' },
  { key: 'transport', emoji: '🚌', label: '교통' },
  { key: 'feature',   emoji: '💡', label: '특징' },
  { key: 'meal',      emoji: '🍽️', label: '식사' },
  { key: 'shopping',  emoji: '🛍️', label: '쇼핑' },
];

let tripData  = null;
let shareId   = null;

// ── 초기화 ──────────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  shareId = params.get('share');

  if (!shareId) {
    showError();
    return;
  }

  try {
    const res  = await fetch(
      `${SUPABASE_URL}/rest/v1/shared_trips?id=eq.${shareId}&select=id,title,data,expires_at,is_active&limit=1`,
      { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
    );
    const arr  = await res.json();
    const row  = arr && arr[0];

    if (!row || !row.is_active) { showError(); return; }
    if (row.expires_at && new Date(row.expires_at) < new Date()) { showError(); return; }

    tripData = row.data;

    // 선택 화면 표시
    document.getElementById('choiceTripName').textContent = row.title || '공유된 여행';
    if (tripData?.startDate && tripData?.endDate) {
      document.getElementById('choiceTripDates').textContent =
        `${tripData.startDate} ~ ${tripData.endDate}`;
    }

    hide('loadingScreen');
    show('choiceScreen');

  } catch (e) {
    console.error(e);
    showError();
  }
});

// ── 선택 핸들러 ─────────────────────────────────────────────────────────────

function handleViewOnly() {
  hide('choiceScreen');
  renderViewer();
  show('viewer');
}

function handleOpenApp() {
  // 딥링크 시도 → 앱 없으면 스토어로 fallback
  const deepLink = `tripbook://share/${shareId}`;

  // 앱 열기 시도
  window.location.href = deepLink;

  // 1.5초 후 앱이 안 열렸으면 스토어로
  setTimeout(() => {
    const isAndroid = /android/i.test(navigator.userAgent);
    const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isAndroid) {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.tripbook';
    } else if (isIOS) {
      window.location.href = 'https://apps.apple.com/app/tripbook/id000000000';
    } else {
      // 데스크탑: 보기만으로 fallback
      handleViewOnly();
    }
  }, 1500);
}

// ── 일정 렌더링 ─────────────────────────────────────────────────────────────

function renderViewer() {
  if (!tripData) return;

  document.getElementById('viewerTitle').textContent = tripData.name || '공유된 여행';
  if (tripData.startDate && tripData.endDate) {
    document.getElementById('viewerDates').textContent =
      `${tripData.startDate} ~ ${tripData.endDate}`;
  }

  const dates = getTripDates(tripData.startDate, tripData.endDate);
  const container = document.getElementById('viewerContent');
  container.innerHTML = '';

  dates.forEach((dateStr, dayIdx) => {
    const d      = parseLocalDate(dateStr);
    const dayLabel = `Day${dayIdx + 1}`;
    const dateLabel = `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;

    // 이 날의 도시
    const city = (tripData.cities || []).find(c => c.startDate <= dateStr && c.endDate >= dateStr);

    // 이 날의 셀들
    const cells = [];
    CATS.forEach((cat, catIdx) => {
      const raw  = tripData.cells?.[catIdx]?.[dayIdx];
      const cell = parseCell(raw);
      if (cell?.title) cells.push({ cat, cell });
    });

    const section = document.createElement('div');
    section.className = 'day-section';

    // 헤더
    section.innerHTML = `
      <div class="day-header">
        <span class="day-badge">${dayLabel}</span>
        <span class="day-date">${dateLabel}</span>
        ${city ? `<span class="day-city">🏙️ ${city.name}</span>` : ''}
      </div>
    `;

    // 셀 목록
    if (cells.length === 0) {
      section.innerHTML += `<div class="empty-day">등록된 일정이 없습니다</div>`;
    } else {
      cells.forEach(({ cat, cell }) => {
        const row = document.createElement('div');
        row.className = 'cell-row';

        let detailHtml = '';
        if (cell.detail) {
          try {
            const d = typeof cell.detail === 'string' ? JSON.parse(cell.detail) : cell.detail;
            if (d.memo) detailHtml += `<div class="cell-detail">${escHtml(d.memo)}</div>`;
            if (d.time) detailHtml += `<div class="cell-detail">🕐 ${escHtml(d.time)}</div>`;
          } catch {
            if (typeof cell.detail === 'string' && cell.detail.length < 200) {
              detailHtml += `<div class="cell-detail">${escHtml(cell.detail)}</div>`;
            }
          }
        }
        const budgetHtml = cell.budget
          ? `<div class="cell-budget">💰 ${Number(cell.budget).toLocaleString()}원</div>`
          : '';

        row.innerHTML = `
          <div class="cell-cat">
            <span class="emoji">${cat.emoji}</span>
            <span class="cat-label">${cat.label}</span>
          </div>
          <div class="cell-content">
            <div class="cell-title">${escHtml(cell.title)}</div>
            ${detailHtml}
            ${budgetHtml}
          </div>
        `;
        section.appendChild(row);
      });
    }

    container.appendChild(section);
  });
}

// ── 유틸 ────────────────────────────────────────────────────────────────────

function parseLocalDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getTripDates(start, end) {
  const dates = [];
  const cur   = parseLocalDate(start);
  const last  = parseLocalDate(end);
  while (cur <= last) {
    const y = cur.getFullYear();
    const m = String(cur.getMonth()+1).padStart(2,'0');
    const d = String(cur.getDate()).padStart(2,'0');
    dates.push(`${y}-${m}-${d}`);
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function parseCell(raw) {
  if (!raw) return null;
  try { return typeof raw === 'string' ? JSON.parse(raw) : raw; }
  catch { return null; }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function show(id) { document.getElementById(id).classList.add('show'); }
function hide(id) { document.getElementById(id).classList.remove('show');
                    document.getElementById(id).style.display = 'none'; }
function showError() {
  hide('loadingScreen');
  document.getElementById('errorScreen').style.display = 'flex';
}
</script>
</body>
</html>
